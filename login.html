<!doctype html>
<html lang="en">
  <head>
    <script src="assets/js/login.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinSwtich – Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/login.css" />
    <style></style>
  </head>
  <body>
    <!-- Background glows -->
    <div class="dot-glow-bl"></div>
    <div class="dot-glow-tr"></div>

    <!-- Scatter dots -->
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>
    <div class="dot dot-7"></div>
    <div class="dot dot-8"></div>
    <div class="dot dot-9"></div>
    <div class="dot dot-10"></div>
    <div class="dot dot-11"></div>

    <!-- Top-left logo -->
    <nav class="nav">
      <div class="nav-logo-box">
        <a href="index.html"
          ><img src="assets/images/CoinSwtich.png" alt=""
        /></a>
      </div>
      <!-- <span class="nav-logo-text">PIMCO</span> -->
    </nav>

    <!-- Top-right icon buttons -->
    <div class="top-right">
      <button class="icon-btn" id="btn-globe" title="Language">
        <span class="badge badge-green"></span>
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <path
            d="M3.6 9h16.8M3.6 15h16.8M12 3a14.5 14.5 0 0 1 0 18M12 3a14.5 14.5 0 0 0 0 18"
          />
        </svg>
      </button>
      <button class="icon-btn" id="btn-headset" title="Support">
        <span class="badge badge-teal"></span>
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
          <path
            d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"
          />
        </svg>
      </button>
    </div>

    <!-- Centered content -->
    <div class="page-center">
      <!-- Circular logo avatar -->
      <div class="avatar">
        <div class="avatar-inner">
          <a href="index.html">
            <img src="assets/images/CoinSwtich.png" alt="" />
          </a>
        </div>
      </div>

      <!-- Heading -->
      <h1 class="heading">Welcome <span>Back</span></h1>
      <p class="subheading">Sign in to your account</p>

      <!-- Login card -->
      <div class="card">
        <!-- Username -->
        <div class="input-group">
          <svg
            class="input-icon"
            viewBox="0 0 24 24"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          <input
            id="username"
            type="text"
            class="input-field"
            placeholder="User Name"
            autocomplete="username"
          />
        </div>

        <!-- Password -->
        <div class="input-group">
          <svg
            class="input-icon"
            viewBox="0 0 24 24"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input
            id="password"
            type="password"
            class="input-field"
            placeholder="User Password"
            autocomplete="current-password"
          />
          <button
            class="toggle-pw"
            id="toggle-pw"
            title="Show/Hide Password"
            type="button"
          >
            <svg
              id="eye-icon"
              viewBox="0 0 24 24"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>

        <!-- Login button -->
        <button class="btn-login" id="btn-login" type="button">Login</button>

        <!-- Register link -->
        <p class="register-row">
          No account?
          <a href="Signup.html" id="link-register">Register Now</a>
        </p>
      </div>
    </div>
  </body>
</html>
