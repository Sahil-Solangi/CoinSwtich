<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinSwtich</title>
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="home-page.css" />
    <style></style>
  </head>
  <body>
    <!-- ═══════════════ TICKER ═══════════════ -->
    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack">
        <!-- items injected by JS -->
      </div>
    </div>

    <!-- ═══════════════ HEADER ═══════════════ -->
    <header>
      <div class="logo-wrap">
        <a href=""><img src="Asset/CoinSwtich.png" alt="" /></a>
        <span class="welcome-text">Welcome!</span>
      </div>
      <div class="bell-btn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          width="18"
          height="18"
        >
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </div>
    </header>

    <!-- ═══════════════ MAIN ═══════════════ -->
    <main>
      <!-- Market Overview -->
      <section class="market-overview">
        <h1 class="section-title">Market <span>Overview</span></h1>
        <div class="market-cards">
          <div class="market-card">
            <div class="pair">BTC<span>/USDT</span></div>
            <div class="price">77517.88</div>
            <div class="change"><span class="change-arrow">▼</span> 1%</div>
          </div>
          <div class="market-card">
            <div class="pair">ETH<span>/USDT</span></div>
            <div class="price">2316.24</div>
            <div class="change"><span class="change-arrow">▼</span> 2%</div>
          </div>
          <div class="market-card">
            <div class="pair">DOGE<span>/USDT</span></div>
            <div class="price" style="font-size: 13px">0.097966</div>
            <div class="change"><span class="change-arrow">▼</span> 2%</div>
          </div>
        </div>
      </section>

      <!-- Quick Actions -->
      <section class="quick-actions">
        <h2 class="section-title">Quick Actions</h2>
        <div class="qa-grid">
          <div class="qa-card">
            <img
              src="asset/recharge.png"
              alt="Recharge"
              style="
                width: 52px;
                height: 52px;
                border-radius: 50%;
                object-fit: cover;
              "
            />
            <span class="qa-label">Recharge</span>
          </div>
          <div class="qa-card">
            <img
              src="asset/withdraw.png"
              alt="Withdraw"
              style="
                width: 52px;
                height: 52px;
                border-radius: 50%;
                object-fit: cover;
              "
            />
            <span class="qa-label">Withdraw</span>
          </div>
          <div class="qa-card">
            <img
              src="asset/convert.jpg"
              alt="Convert"
              style="
                width: 52px;
                height: 52px;
                border-radius: 50%;
                object-fit: cover;
              "
            />
            <span class="qa-label">Convert</span>
          </div>
        </div>
      </section>

      <!-- Trading Hall -->
      <section class="trading-hall">
        <div class="trading-hall-header">
          <h2 class="section-title" style="margin-bottom: 0">Trading Hall</h2>
          <div class="live-badge"><span class="live-dot"></span> Live</div>
        </div>

        <table class="trade-table">
          <thead>
            <tr>
              <th>Name/Turnover</th>
              <th style="text-align: center">Last price</th>
              <th style="text-align: right">Change</th>
            </tr>
          </thead>
          <tbody id="tradeBody"></tbody>
        </table>
      </section>
    </main>

    <!-- ═══════════════ BOTTOM NAV ═══════════════ -->
    <nav class="bottom-nav">
      <!-- Home -->
      <div class="nav-item active" id="nav-home">
        <div class="nav-icon-wrap">
          <a href="home-page.html">
            <svg
              viewBox="0 0 24 24"
              fill="white"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"
              />
              <path d="M9 21V12h6v9" fill="#0b5ed7" />
            </svg>
          </a>
        </div>
      </div>
      <!-- Chart -->
      <div class="nav-item" id="nav-chart">
        <div class="nav-icon-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#6a7d9a"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
        </div>
      </div>
      <!-- Doc -->
      <div class="nav-item" id="nav-doc">
        <div class="nav-icon-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#6a7d9a"
            stroke-width="2"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14,2 14,8 20,8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <line x1="10" y1="9" x2="8" y2="9" />
          </svg>
        </div>
      </div>
      <!-- Profile -->
      <div class="nav-item" id="nav-profile">
        <div class="nav-icon-wrap">
          <a href="login-page.html"
            ><svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#6a7d9a"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" /></svg
          ></a>
        </div>
      </div>
    </nav>

    <script>

        },
        {

        {

        {

        {

        },
        {
          icon: "⬡",
          iconBg: "#2a5ada",

        },
        {
          icon: "B",

          turnover: "$1.24M",
          price: "6.0448",
          usd: "$6.04",
          chg: "+1%",
          red: false,
        },
      ];

      /* ── BUILD TABLE ── */
      const tbody = document.getElementById("tradeBody");
      coins.forEach((c) => {
        const priceColor = c.red ? "#e84545" : "#00c896";
        tbody.innerHTML += `
    <tr>
      <td>
        <div class="coin-cell">
          <div class="coin-icon" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
          <div class="coin-name-wrap">
            <div><span class="coin-base">${c.base}</span><span class="coin-quote">/${c.quote}</span></div>
            <div class="coin-turnover">${c.turnover}</div>
          </div>
        </div>
      </td>
      <td class="price-cell">
        <div class="price-main" style="color:${priceColor}">${c.price}</div>
        <div class="price-usd">${c.usd}</div>
      </td>
      <td class="change-cell">
        <span class="chg-badge ${c.red ? "chg-red" : "chg-green"}">${c.chg}</span>
      </td>
    </tr>`;
      });

      /* ── BUILD TICKER ── */
      const tickerData = [
        { label: "BTC: 42,380", chg: "+2.4%", red: false },
        { label: "ETH: 2,680", chg: "-1.26%", red: true },
        { label: "BNB: 315", chg: "+0.87%", red: false },
        { label: "TRX: 0.323685", chg: "1%", red: false },
        { label: "CHZ: 0.04999", chg: "1%", red: false },
      ];
      const track = document.getElementById("tickerTrack");

      [...tickerData, ...tickerData].forEach((t) => {
        const span = document.createElement("div");
        span.className = "ticker-item";
        const dotClass = t.red ? "dot red" : "dot";
        const badgeClass = t.red ? "badge-red" : "badge-green";
        span.innerHTML = `<span class="${dotClass}"></span>${t.label} <span class="ticker-badge ${badgeClass}">${t.chg}</span>`;
        track.appendChild(span);
      });
    </script>
  </body>
</html>
