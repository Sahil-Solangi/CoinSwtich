<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta
      name="description"
      content="Registration successful - Sign in with your credentials"
    />
    <meta name="theme-color" content="#0d1a2a" />
    <title>CoinSwtich – Registration complete</title>

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/register-success.css" />
  </head>
  <body>
    <!-- Decorative elements -->
    <div class="dot-glow-bl" aria-hidden="true"></div>
    <div class="dot-glow-tr" aria-hidden="true"></div>

    <!-- Floating dots for background effect -->
    <div class="dot dot-1" aria-hidden="true"></div>
    <div class="dot dot-2" aria-hidden="true"></div>
    <div class="dot dot-3" aria-hidden="true"></div>
    <div class="dot dot-4" aria-hidden="true"></div>
    <div class="dot dot-5" aria-hidden="true"></div>
    <div class="dot dot-6" aria-hidden="true"></div>
    <div class="dot dot-7" aria-hidden="true"></div>
    <div class="dot dot-8" aria-hidden="true"></div>
    <div class="dot dot-9" aria-hidden="true"></div>
    <div class="dot dot-10" aria-hidden="true"></div>
    <div class="dot dot-11" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav class="nav" role="navigation">
      <div class="nav-logo-box">
        <a href="index.html" title="Go to home">
          <img src="assets/images/CoinSwtich.png" alt="CoinSwtich Logo" />
        </a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="page-center">
      <!-- Avatar / Logo section -->
      <section class="avatar">
        <div class="avatar-inner">
          <a href="index.html" title="Go to home">
            <img src="assets/images/CoinSwtich.png" alt="CoinSwtich Logo" />
          </a>
        </div>
      </section>

      <!-- Page title -->
      <h1 class="heading">Registration <span>successfully done</span></h1>

      <!-- Subheading -->
      <p class="subheading register-success-sub">Back to login</p>

      <!-- Success card -->
      <article class="card register-success-card">
        <!-- Success badge -->
        <div class="success-done-badge" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-label="Success checkmark"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
        </div>

        <!-- Success message -->
        <p class="register-success-msg">
          Sign in with your username and password on the next page.
        </p>

        <!-- Login button -->
        <a class="btn-login" href="login.html" title="Go to login page"
          >Back to login</a
        >
      </article>
    </main>
  </body>
</html>
