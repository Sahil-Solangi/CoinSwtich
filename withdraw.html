<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin withdrawal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/withdraw.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="top-header">
      <div class="left">
        <a href="index.html" class="back-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <span class="title">Coin withdrawal</span>
      </div>
      <div class="right">
        <a href="#" class="log-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            ></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <line x1="10" y1="9" x2="8" y2="9"></line>
          </svg>
        </a>
      </div>
    </header>

    <main>
      <!-- BALANCE CARD -->
      <section class="balance-card">
        <div class="card-title">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="wallet-icon"
          >
            <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="2" y1="10" x2="22" y2="10"></line>
          </svg>
          Available Balance
        </div>
        <div class="card-amount">₹0.00 <span class="currency">INR</span></div>
      </section>

      <!-- CHANNEL -->
      <section class="channel-section">
        <div class="channel-label">Cash withdrawal channel</div>
        <div class="channel-btn">Bank Card</div>
      </section>

      <!-- CURRENCY -->
      <section class="form-group">
        <label>Currency</label>
        <div class="select-wrapper">
          <div class="select-value">INR</div>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dropdown-icon"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </section>

      <!-- BANK NAME -->
      <section class="form-group">
        <label>Bank Name</label>
        <div class="input-wrapper">
          <input type="text" placeholder="Bank Name" />
        </div>
      </section>

      <!-- ACCOUNT NAME -->
      <section class="form-group">
        <label>Account Name</label>
        <div class="input-wrapper">
          <input type="text" placeholder="Account Name" />
        </div>
      </section>

      <!-- ACCOUNT NUMBER -->
      <section class="form-group">
        <label>Account Number</label>
        <div class="input-wrapper">
          <input type="text" placeholder="Account Number" />
        </div>
      </section>

      <!-- IFSC -->
      <section class="form-group">
        <label>IFSC</label>
        <div class="input-wrapper">
          <input type="text" placeholder="IFSC" />
        </div>
      </section>

      <!-- NUMBER -->
      <section class="form-group">
        <label
          >Number
          <span class="min-amount">(Minimum Withdrawal Amount:)</span></label
        >
        <div class="input-wrapper with-button">
          <input type="text" value="0" />
          <button class="total-btn">Total</button>
        </div>
      </section>
    </main>

    <!-- BOTTOM BUTTON -->
    <div class="submit-wrapper">
      <button class="submit-btn">Confirm coin withdrawal</button>
    </div>
    <!-- ═══════════════ BOTTOM NAV ═══════════════ -->
    <nav class="bottom-nav">
      <!-- Home -->
      <div class="nav-item" id="nav-home">
        <div class="nav-icon-wrap">
          <a href="index.html">
            <svg
              viewBox="0 0 24 24"
              fill="white"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"
              />
              <path d="M9 21V12h6v9" fill="#0b5ed7" />
            </svg>
          </a>
        </div>
      </div>
      <!-- Chart -->
      <div class="nav-item" id="nav-chart">
        <div class="nav-icon-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#6a7d9a"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
        </div>
      </div>
      <!-- Spot -->
      <div class="nav-item" id="nav-spot">
        <div class="nav-icon-wrap">
          <a href="spot.html" style="color: inherit; display: flex; align-items: center; text-decoration: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#6a7d9a" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2" ry="2" />
              <line x1="2" y1="10" x2="22" y2="10" />
            </svg>
          </a>
        </div>
      </div>
      <!-- Notification -->
      <div class="nav-item" id="nav-notification">
        <div class="nav-icon-wrap">
          <a href="notification.html" style="color: inherit; display: flex; align-items: center; text-decoration: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#6a7d9a" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </a>
        </div>
      </div>
      <!-- Profile -->
      <div class="nav-item" id="nav-profile">
        <div class="nav-icon-wrap">
          <a href="login.html"
            ><svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#6a7d9a"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" /></svg
          ></a>
        </div>
      </div>
    </nav>
  </body>
</html>
