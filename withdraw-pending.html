<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinSwtich – Withdrawal processing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/register-success.css" />
    <link rel="stylesheet" href="assets/css/withdraw-pending.css" />
  </head>
  <body>
    <div class="dot-glow-bl" aria-hidden="true"></div>
    <div class="dot-glow-tr" aria-hidden="true"></div>

    <div class="dot dot-1" aria-hidden="true"></div>
    <div class="dot dot-2" aria-hidden="true"></div>
    <div class="dot dot-3" aria-hidden="true"></div>
    <div class="dot dot-4" aria-hidden="true"></div>
    <div class="dot dot-5" aria-hidden="true"></div>
    <div class="dot dot-6" aria-hidden="true"></div>
    <div class="dot dot-7" aria-hidden="true"></div>
    <div class="dot dot-8" aria-hidden="true"></div>
    <div class="dot dot-9" aria-hidden="true"></div>
    <div class="dot dot-10" aria-hidden="true"></div>
    <div class="dot dot-11" aria-hidden="true"></div>

    <nav class="nav" role="navigation">
      <div class="nav-logo-box">
        <a href="index.html" title="Home">
          <img src="assets/images/CoinSwtich.png" alt="CoinSwtich" />
        </a>
      </div>
    </nav>

    <main class="page-center">
      <section class="avatar">
        <div class="avatar-inner">
          <a href="index.html" title="Home">
            <img src="assets/images/CoinSwtich.png" alt="" />
          </a>
        </div>
      </section>

      <h1 class="heading">Withdrawal <span>in progress</span></h1>
      <p class="subheading register-success-sub" id="withdraw-summary">
        Your amount is being withdrawn.
      </p>

      <article class="card register-success-card">
        <div class="success-done-badge withdraw-pending-icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </div>
        <p class="register-success-msg withdraw-pending-highlight">
          Your withdrawal request has been received. The amount will be
          processed and sent within <strong>30 minutes</strong>.
        </p>
        <p class="withdraw-pending-note">
          Please keep your bank details handy. You can return to the home
          screen while you wait.
        </p>
        <a class="btn-login" href="index.html">Back to home</a>
      </article>
    </main>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);
        var amt = p.get("amount");
        var cur = p.get("currency") || "INR";
        var el = document.getElementById("withdraw-summary");
        if (!amt || !el) return;
        var n = Number(amt);
        var formatted = isNaN(n)
          ? amt
          : n.toLocaleString("en-IN", {
              minimumFractionDigits: 2,
              maximumFractionDigits: 2,
            });
        if (cur === "INR") {
          el.textContent =
            "Your withdrawal of ₹" + formatted + " is being processed.";
        } else {
          el.textContent =
            "Your withdrawal of " +
            formatted +
            " " +
            cur +
            " is being processed.";
        }
      })();
    </script>
  </body>
</html>
