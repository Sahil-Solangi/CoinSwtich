<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perpetual Futures Trading - CoinSwitch</title>

    <!-- TradingView Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/trade.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="trade-header">
      <div class="header-left">
        <a href="index.html" class="back-btn">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </a>
        <h1 id="coinSymbol">BTCUSDT</h1>
        <div class="coin-info">
          <span class="live-price" id="livePrice">$0.00</span>
          <span class="price-change" id="priceChange24h" data-positive="true"
            >+0.00%</span
          >
        </div>
      </div>
      <div class="header-right">
        <a href="dashboard.php" class="dashboard-link">Dashboard</a>
      </div>
    </header>

    <!-- Main Container -->
    <div class="trade-container">
      <!-- Left Panel - Chart -->
      <div class="chart-panel">
        <div class="chart-tabs">
          <button class="tab-btn active" data-tab="perpetual">Perpetual</button>
          <button class="tab-btn" data-tab="delivery">Delivery</button>
        </div>
        <div class="chart-wrapper">
          <div id="tradingview-chart"></div>
        </div>
      </div>

      <!-- Right Panel - Trading Controls -->
      <div class="trading-panel">
        <!-- Margin & Leverage Controls -->
        <div class="margin-controls">
          <div class="margin-type">
            <button class="margin-btn active" data-margin="cross">
              <span>Cross</span>
              <small>Risk high</small>
            </button>
            <button class="margin-btn" data-margin="isolated">
              <span>Isolated</span>
              <small>Risk low</small>
            </button>
          </div>

          <div class="leverage-selector">
            <label>Leverage</label>
            <div class="leverage-controls">
              <button class="leverage-minus">−</button>
              <input
                type="number"
                id="leverageInput"
                value="1"
                min="1"
                max="125"
                readonly
              />
              <button class="leverage-plus">+</button>
            </div>
            <input
              type="range"
              id="leverageSlider"
              min="1"
              max="125"
              value="1"
              class="leverage-slider"
            />
          </div>
        </div>

        <!-- Buy/Sell Buttons -->
        <div class="buy-sell-buttons">
          <button class="order-btn long-btn active" data-type="long">
            <span>Buy Long</span>
            <small>Profit if price ↑</small>
          </button>
          <button class="order-btn short-btn" data-type="short">
            <span>Sell Short</span>
            <small>Profit if price ↓</small>
          </button>
        </div>

        <!-- Order Type Selector -->
        <div class="order-type-selector">
          <label>Order Type</label>
          <select id="orderType" class="order-type-select">
            <option value="market">Market Order</option>
            <option value="limit">Limit Order</option>
            <option value="stop">Stop Limit</option>
          </select>
        </div>

        <!-- Price Input (for Limit Orders) -->
        <div
          class="price-input-group"
          id="priceInputGroup"
          style="display: none"
        >
          <label>Price (USDT)</label>
          <input type="number" id="limitPrice" placeholder="0.00" step="0.01" />
        </div>

        <!-- Amount Input -->
        <div class="amount-input-group">
          <label>Quantity</label>
          <input
            type="number"
            id="quantityInput"
            placeholder="0.00"
            step="0.001"
          />
          <small id="quantityValue">≈ $0.00</small>
        </div>

        <!-- Percentage Slider -->
        <div class="percentage-slider-group">
          <label>Percentage</label>
          <div class="percentage-buttons">
            <button class="pct-btn" data-pct="25">25%</button>
            <button class="pct-btn" data-pct="50">50%</button>
            <button class="pct-btn" data-pct="75">75%</button>
            <button class="pct-btn" data-pct="100">100%</button>
          </div>
          <input
            type="range"
            id="percentageSlider"
            min="0"
            max="100"
            value="0"
            class="slider"
          />
        </div>

        <!-- Risk Information -->
        <div class="risk-info">
          <div class="risk-item">
            <span>Entry Price:</span>
            <span id="entryPrice">$0.00</span>
          </div>
          <div class="risk-item">
            <span>Liquidation Price:</span>
            <span id="liquidationPrice">$0.00</span>
          </div>
          <div class="risk-item">
            <span>Margin Required:</span>
            <span id="marginRequired">$0.00</span>
          </div>
        </div>

        <!-- Place Order Button -->
        <button class="place-order-btn" id="placeOrderBtn">Place Order</button>

        <!-- Tabs -->
        <div class="trading-tabs">
          <button class="trading-tab-btn active" data-trading-tab="order-book">
            Order Book
          </button>
          <button class="trading-tab-btn" data-trading-tab="positions">
            Positions
          </button>
          <button class="trading-tab-btn" data-trading-tab="orders">
            Open Orders
          </button>
        </div>

        <!-- Tab Contents -->
        <div class="trading-tab-content">
          <!-- Order Book Tab -->
          <div class="order-book-tab" id="orderBookTab">
            <div class="order-book">
              <div class="ob-section">
                <h4>Sell Orders (Ask)</h4>
                <div class="ob-list asks-list" id="asksList">
                  <!-- Loaded dynamically -->
                </div>
              </div>
              <div class="middle-price">
                <span id="middlePrice">$0.00</span>
              </div>
              <div class="ob-section">
                <h4>Buy Orders (Bid)</h4>
                <div class="ob-list bids-list" id="bidsList">
                  <!-- Loaded dynamically -->
                </div>
              </div>
            </div>
          </div>

          <!-- Positions Tab -->
          <div class="positions-tab" id="positionsTab" style="display: none">
            <div class="positions-list" id="positionsList">
              <p class="empty-state">No open positions</p>
            </div>
          </div>

          <!-- Open Orders Tab -->
          <div class="orders-tab" id="ordersTab" style="display: none">
            <div class="orders-list" id="ordersList">
              <p class="empty-state">No open orders</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal for order confirmation -->
    <div class="modal" id="orderModal">
      <div class="modal-content">
        <button class="modal-close">&times;</button>
        <h2>Confirm Order</h2>
        <div class="modal-details">
          <p><span>Type:</span> <span id="modalOrderType">Buy Long</span></p>
          <p><span>Quantity:</span> <span id="modalQuantity">0</span></p>
          <p><span>Price:</span> <span id="modalPrice">$0.00</span></p>
          <p><span>Total Value:</span> <span id="modalTotal">$0.00</span></p>
          <p><span>Leverage:</span> <span id="modalLeverage">1x</span></p>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel">Cancel</button>
          <button class="btn-confirm">Confirm Order</button>
        </div>
      </div>
    </div>

    <!-- Notifications -->
    <div class="notification" id="notification"></div>

    <script src="assets/js/trade.js"></script>
  </body>
</html>
